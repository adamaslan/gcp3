steps:
  - name: gcr.io/cloud-builders/docker
    args: [build, -t, gcr.io/$PROJECT_ID/gcp3-frontend, .]

  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/gcp3-frontend]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gcp3-frontend
      - --image=gcr.io/$PROJECT_ID/gcp3-frontend
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --max-instances=5
      - --set-env-vars=BACKEND_URL=$$BACKEND_URL,NEXT_PUBLIC_APP_URL=$$FRONTEND_URL
    secretEnv:
      - BACKEND_URL
      - FRONTEND_URL

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/gcp3-backend-url/versions/latest
      env: BACKEND_URL
    - versionName: projects/$PROJECT_ID/secrets/gcp3-frontend-url/versions/latest
      env: FRONTEND_URL

images:
  - gcr.io/$PROJECT_ID/gcp3-frontend
