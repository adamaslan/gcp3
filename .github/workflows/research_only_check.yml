name: research-only-check

on:
  pull_request:
  push:

jobs:
  grep-execution-phrases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject execution-flavored function names
        run: |
          ! grep -RInE 'place_order|submit_order|execute_trade|buy_market|sell_market|limit_order|stop_order|broker_submit' backend --exclude-dir=.git --exclude='research_only_check.yml'
